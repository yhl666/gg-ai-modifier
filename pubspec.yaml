name: ai_gg666
description: "AI 驱动的游戏内存修改器 - GG Modifier"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP 请求 (LLM API)
  http: ^1.2.2
  
  # 工具
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  
  # UI 组件
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - lua/
    - lua/builtins/
    - lua/templates/
